    - data:
        code: "import json\nimport re\n\ndef main(http_response: str) -> dict:\n \
          \   # 1. 强力清洗：去掉前后可能存在的隐形双引号、换行符和转义反斜杠\n    clean_str = http_response.strip()\n\
          \    \n    # 2. 如果字符串前后被包裹了多余的双引号，进行剥离\n    if clean_str.startswith('\"\
          ') and clean_str.endswith('\"'):\n        clean_str = clean_str[1:-1]\n\
          \    \n    # 3. 修复转义的反斜杠 \\\" -> \"\n    clean_str = clean_str.replace('\\\
          \\\"', '\"')\n    clean_str = clean_str.replace('\\\\\\\\', '\\\\')\n  \
          \  \n    try:\n        # 4. 尝试解析成字典\n        res_dict = json.loads(clean_str)\n\
          \        img_url = res_dict[\"data\"][0][\"url\"]\n        return {\"url\"\
          : img_url}\n        \n    except Exception as e:\n        # 5. 兜底方案：如果 JSON\
          \ 依然解不开，用万能的正则表达式直接暴力提取 URL \n        url_match = re.search(r'\"url\"\\\
          s*:\\s*\"([^\"]+)\"', clean_str)\n        if url_match:\n            return\
          \ {\"url\": url_match.group(1)}\n        else:\n            return {\"url\"\
          : f\"提取失败，原始数据为: {http_response[:100]}\"}"
